            setupEventListeners();
        }

        // ============================================================================
        // 📊 MÉTRICA DE CONSISTÊNCIA - CONFIABILIDADE DOS DADOS
        // ============================================================================
        function calculateConsistency(result) {
            if (!result.hotZones || result.hotZones.length === 0) {
                return { level: 'BAIXA', percentage: 0, description: 'Sem dados para análise' };
            }

            const topProbability = result.hotZones[0]?.probability || 0;
            let level = 'BAIXA';
            let percentage = Math.round(topProbability * 100);

            if (topProbability > 0.15) {
                level = 'ALTA';
            } else if (topProbability >= 0.08) {
                level = 'MÉDIA';
            }

            // Ajustar com base na quantidade de dados
            if (result.totalEntries < 5) {
                percentage = Math.max(0, percentage - 20);
                level = 'BAIXA';
            } else if (result.totalEntries < 10) {
                percentage = Math.max(0, percentage - 10);
            }

            return { level, percentage, description: `${level} CONSISTÊNCIA` };
        }

        function renderConsistency(result) {
            const consistency = calculateConsistency(result);
            const colorMap = {
                'ALTA': '#FF3B3B',
                'MÉDIA': '#FFA500',
                'BAIXA': '#666666'
            };
            const color = colorMap[consistency.level] || '#666666';

            return `
                <div class="rounded-2xl border p-5 bg-card shadow-glow mb-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-lg font-bold" style="color: ${color};">📊 ${consistency.description}</h3>
                            <p class="text-sm text-muted-foreground mt-1">Confiabilidade dos dados analisados</p>
                        </div>
                        <div class="text-4xl font-bold" style="color: ${color};">${consistency.percentage}%</div>
                    </div>
                    <div class="mt-3 w-full bg-muted rounded-full h-2 overflow-hidden">
                        <div style="width: ${consistency.percentage}%; height: 100%; background-color: ${color}; transition: width 0.3s ease;"></div>
                    </div>
                </div>
            `;
        }

        // ============================================================================
        // 🧠 PREVISÃO EXPLICADA - INTELIGÊNCIA CONTEXTUAL
        // ============================================================================
        function explainPredictions(result) {
            if (!result.predictions || result.predictions.length === 0) {
                return [];
            }

            return result.predictions.map((prediction, idx) => {
                const zone = result.hotZones && result.hotZones[idx];
                let explanation = 'Baseado em análise de padrões';

                if (zone) {
                    if (zone.probability > 0.15) {
                        explanation = '🔴 Alta concentração de eventos neste horário';
                    } else if (zone.probability > 0.10) {
                        explanation = '🟡 Concentração moderada de eventos';
                    } else {
                        explanation = '⚪ Baseado em padrão recente detectado';
                    }
                }

                // Adicionar contexto de padrão se disponível
                if (result.patterns && result.patterns.length > 0) {
                    explanation += ' • ' + result.patterns[0];
                }

                return { prediction, explanation };
            });
        }

        function renderPredictionExplanations(result) {
            const explanations = explainPredictions(result);
            
            if (explanations.length === 0) {
                return '';
            }

            const explanationsHTML = explanations.map((item, idx) => `
                <div class="rounded-xl border border-white/10 bg-white/5 p-4 mb-3">
                    <div class="text-sm font-bold text-foreground mb-1">${item.prediction}</div>
                    <div class="text-xs text-muted-foreground italic">${item.explanation}</div>
                </div>
            `).join('');

            return `
                <div class="rounded-2xl border p-5 bg-card shadow-glow mt-4">
                    <h3 class="text-lg font-bold mb-4">💡 Por que essas previsões?</h3>
                    ${explanationsHTML}
                </div>
            `;
        }

                // ============================================================================
        // 🚀 MÓDULO AVANÇADO DE ANÁLISE DE OPORTUNIDADES
        // ============================================================================

        // 1. MOMENTUM - Força da sequência
        function getMomentum(entries) {
            if (entries.length < 2) return { signal: 'NEUTRO', score: 0 };
            
            const last = entries.slice(-3);
            const colors = last.map(e => e.color);
            
            if (colors.every(c => c === 'up')) {
                return { signal: 'ALTA', score: 20, reason: 'Momentum de alta detectado' };
            }
            if (colors.every(c => c === 'down')) {
                return { signal: 'BAIXA', score: -20, reason: 'Momentum de baixa detectado' };
            }
            return { signal: 'NEUTRO', score: 0 };
        }

        // 2. REVERSÃO CURTA
        function detectReversal(entries) {
            if (entries.length < 3) return { score: 0 };
            
            const last3 = entries.slice(-3).map(e => e.color);
            
            if (last3[0] === 'down' && last3[1] === 'down' && last3[2] === 'up') {
                return { score: 25, reason: 'Sinal de reversão de alta detectado' };
            }
            if (last3[0] === 'up' && last3[1] === 'up' && last3[2] === 'down') {
                return { score: -25, reason: 'Sinal de reversão de baixa detectado' };
            }
            return { score: 0 };
        }

        // 3. CLUSTER DE COR
        function getCluster(entries) {
            if (entries.length < 5) return { score: 0 };
            
            const last10 = entries.slice(-10);
            const upCount = last10.filter(e => e.color === 'up').length;
            const downCount = last10.filter(e => e.color === 'down').length;
            
            const upPercentage = upCount / last10.length;
            const downPercentage = downCount / last10.length;
            
            if (upPercentage > 0.7) {
                return { score: 20, reason: 'Cluster de alta dominante' };
            }
            if (downPercentage > 0.7) {
                return { score: -20, reason: 'Cluster de baixa dominante' };
            }
            return { score: 0 };
        }

        // 4. FADIGA (Exaustão)
        function detectFatigue(entries) {
            if (entries.length < 4) return { score: 0 };
            
            const last4 = entries.slice(-4).map(e => e.color);
            
            if (last4.every(c => c === last4[0]) && last4.length >= 4) {
                return { score: -15, reason: 'Fadiga detectada - possível reversão' };
            }
            return { score: 0 };
        }

        // 5. EQUILÍBRIO (Mercado lateral)
        function detectEquilibrium(entries) {
            if (entries.length < 4) return { score: 0 };
            
            const last6 = entries.slice(-6).map(e => e.color);
            let alternating = true;
            
            for (let i = 1; i < last6.length; i++) {
                if (last6[i] === last6[i - 1]) {
                    alternating = false;
                    break;
                }
            }
            
            if (alternating) {
                return { score: -20, reason: 'Mercado em equilíbrio (baixo sinal)' };
            }
            return { score: 0 };
        }

        // 6. PADRÃO TEMPORAL (Hotzone)
        function checkHotzone(entries, result) {
            if (!result.hotZones || result.hotZones.length === 0) return { score: 0 };
            
            const topZone = result.hotZones[0];
            if (topZone.probability > 0.15) {
                return { score: 15, reason: 'Zona de alta probabilidade ativa' };
            }
            return { score: 0 };
        }

        // 7. ACELERAÇÃO
        function detectAcceleration(entries) {
            if (entries.length < 5) return { score: 0 };
            
            const last5 = entries.slice(-5);
            let acceleration = 0;
            
            for (let i = 1; i < last5.length; i++) {
                if (last5[i].color === last5[i - 1].color) {
                    acceleration++;
                }
            }
            
            if (acceleration >= 3) {
                return { score: 12, reason: 'Movimento acelerado detectado' };
            }
            return { score: 0 };
        }

        // 8. PROBABILIDADE CONDICIONAL
        function conditionalProbability(entries) {
            if (entries.length < 3) return { score: 0 };
            
            const last3 = entries.slice(-3).map(e => e.color);
            const pattern = last3.join('-');
            
            const upPatterns = ['down-down-up', 'down-up-up', 'up-up-up'];
            const downPatterns = ['up-up-down', 'up-down-down', 'down-down-down'];
            
            if (upPatterns.includes(pattern)) {
                return { score: 18, reason: 'Padrão condicional de alta' };
            }
            if (downPatterns.includes(pattern)) {
                return { score: -18, reason: 'Padrão condicional de baixa' };
            }
            return { score: 0 };
        }

        // 9. PADRÃO DE ESCADA
        function detectStairPattern(entries) {
            if (entries.length < 4) return { score: 0 };
            
            const last4 = entries.slice(-4).map(e => e.color);
            
            if (last4[0] === 'down' && last4[1] === 'up' && last4[2] === 'down' && last4[3] === 'up') {
                return { score: 16, reason: 'Padrão de escada de alta' };
            }
            if (last4[0] === 'up' && last4[1] === 'down' && last4[2] === 'up' && last4[3] === 'down') {
                return { score: -16, reason: 'Padrão de escada de baixa' };
            }
            return { score: 0 };
        }

        // 10. BREAKOUT
        function detectBreakout(entries) {
            if (entries.length < 5) return { score: 0 };
            
            const last5 = entries.slice(-5).map(e => e.color);
            const downSequence = last5.slice(0, 3).every(c => c === 'down');
            const upBreak = last5[3] === 'up' && last5[4] === 'up';
            
            if (downSequence && upBreak) {
                return { score: 22, reason: 'Breakout de alta detectado' };
            }
            
            const upSequence = last5.slice(0, 3).every(c => c === 'up');
            const downBreak = last5[3] === 'down' && last5[4] === 'down';
            
            if (upSequence && downBreak) {
                return { score: -22, reason: 'Breakout de baixa detectado' };
            }
            return { score: 0 };
        }

        // 11. CICLOS (Loops)
        function detectCycles(entries) {
            if (entries.length < 6) return { score: 0 };
            
            const last6 = entries.slice(-6).map(e => e.color);
            const pattern = last6.slice(0, 3).join('-');
            const repeat = last6.slice(3, 6).join('-');
            
            if (pattern === repeat) {
                if (pattern.includes('up')) {
                    return { score: 14, reason: 'Ciclo de alta detectado' };
                } else {
                    return { score: -14, reason: 'Ciclo de baixa detectado' };
                }
            }
            return { score: 0 };
        }

        // 12. VELAS ESPECIAIS
        function analyzeSpecialCandle(entries) {
            if (entries.length < 2) return { score: 0 };
            
            const lastTwo = entries.slice(-2);
            const hasSpecial = lastTwo.some(e => e.color === 'special');
            
            if (!hasSpecial) return { score: 0 };
            
            const prevColor = lastTwo[0].color;
            
            if (prevColor === 'down' && lastTwo[1].color === 'special') {
                return { score: 18, reason: 'Vela especial após queda - favorece alta' };
            }
            if (prevColor === 'up' && lastTwo[1].color === 'special') {
                return { score: -12, reason: 'Vela especial após alta - possível reversão' };
            }
            return { score: 0 };
        }

        // ENGINE PRINCIPAL
        function analyzeOpportunities(entries, result) {
            if (entries.length === 0) {
                return {
                    signal: 'NEUTRO',
                    strength: 0,
                    confidence: 0,
                    reasons: ['Sem dados para análise'],
                    details: {}
                };
            }

            let score = 0;
            const reasons = [];
            const details = {};

            // Executar todos os filtros
            const filters = [
                getMomentum(entries),
                detectReversal(entries),
                getCluster(entries),
                detectFatigue(entries),
                detectEquilibrium(entries),
                checkHotzone(entries, result),
                detectAcceleration(entries),
                conditionalProbability(entries),
                detectStairPattern(entries),
                detectBreakout(entries),
                detectCycles(entries),
                analyzeSpecialCandle(entries)
            ];

            // Agregar scores e razões
            filters.forEach(filter => {
                if (filter.score) score += filter.score;
                if (filter.reason) reasons.push(filter.reason);
                if (filter.signal) details[filter.reason] = filter.signal;
            });

            // Normalizar score
            const normalizedScore = Math.min(100, Math.max(0, score + 50));
            
            // Definir sinal
            let signal = 'NEUTRO';
            if (normalizedScore > 65) signal = 'ALTA';
            else if (normalizedScore < 35) signal = 'BAIXA';

            // Calcular confiança
            const confidence = Math.min(100, Math.abs(score) + 30);

            return {
                signal,
                strength: normalizedScore,
                confidence,
                reasons: reasons.length > 0 ? reasons : ['Análise neutra'],
                details
            };
        }

        // RENDERIZAÇÃO
        function renderOpportunity(opportunityResult) {
            if (!opportunityResult) return '';

            const signalColors = {
                'ALTA': '#FF3B3B',
                'BAIXA': '#111111', // Ajustado para preto (baixa) conforme o padrão do sistema
                'NEUTRO': '#FFA500'
            };

            const signalEmojis = {
                'ALTA': '📈',
                'BAIXA': '📉',
                'NEUTRO': '⚖️'
            };

            const color = signalColors[opportunityResult.signal] || '#FFA500';
            const emoji = signalEmojis[opportunityResult.signal] || '🟡';

            const reasonsHTML = opportunityResult.reasons
                .slice(0, 5)
                .map(r => `<li class="text-xs text-muted-foreground">✓ ${r}</li>`)
                .join('');

            return `
                <div class="rounded-2xl border p-6 bg-card shadow-glow mt-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xl font-bold flex items-center gap-2">
                            ${emoji} Oportunidade: <span style="color: ${color};">${opportunityResult.signal}</span>
                        </h3>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="rounded-lg bg-secondary/50 p-3 border border-white/5">
                        <p class="text-[10px] text-muted-foreground uppercase font-bold">Força do Sinal</p>
                        <p class="text-2xl font-bold" style="color: ${color};">${opportunityResult.strength}%</p>
                    </div>
                    <div class="rounded-lg bg-secondary/50 p-3 border border-white/5">
                        <p class="text-[10px] text-muted-foreground uppercase font-bold">Confiança da IA</p>
                        <p class="text-2xl font-bold" style="color: ${color};">${opportunityResult.confidence}%</p>
                    </div>
                    </div>

                    <div class="rounded-lg bg-secondary/30 p-3">
                        <p class="text-xs font-semibold mb-2 text-muted-foreground">Motivos:</p>
                        <ul class="space-y-1">
                            ${reasonsHTML}
                        </ul>
                    </div>
                </div>
            `;
        }

                // ============================================================================
        // 📊 MÓDULO DE ANÁLISE ESTATÍSTICA AVANÇADA
        // ============================================================================

        // Distribuição esperada
        const EXPECTED_DISTRIBUTION = {
            up: 0.47,
            down: 0.47,
            special: 0.06
        };

        // 1. DESVIO ESTATÍSTICO
        function calculateDeviation(entries, windowSize = 100) {
            if (entries.length === 0) {
                return {
                    upDeviation: 0,
                    downDeviation: 0,
                    specialDeviation: 0,
                    upPct: 0,
                    downPct: 0,
                    specialPct: 0
                };
            }

            const window = entries.slice(-windowSize);
            const upCount = window.filter(e => e.color === 'up').length;
            const downCount = window.filter(e => e.color === 'down').length;
            const specialCount = window.filter(e => e.color === 'special').length;

            const upPct = upCount / window.length;
            const downPct = downCount / window.length;
            const specialPct = specialCount / window.length;

            return {
                upDeviation: upPct - EXPECTED_DISTRIBUTION.up,
                downDeviation: downPct - EXPECTED_DISTRIBUTION.down,
                specialDeviation: specialPct - EXPECTED_DISTRIBUTION.special,
                upPct,
                downPct,
                specialPct
            };
        }

        // 2. PRESSÃO DE REEQUILÍBRIO
        function calculateRebalancePressure(deviation) {
            let pressure = 0;
            let reason = '';

            if (deviation.upDeviation > 0.10) {
                pressure -= 25;
                reason = 'Pressão forte para BAIXA (muita alta)';
            } else if (deviation.upDeviation > 0.05) {
                pressure -= 15;
                reason = 'Pressão média para BAIXA';
            } else if (deviation.upDeviation > 0.02) {
                pressure -= 5;
                reason = 'Leve pressão para BAIXA';
            }

            if (deviation.downDeviation > 0.10) {
                pressure += 25;
                reason = 'Pressão forte para ALTA (muita baixa)';
            } else if (deviation.downDeviation > 0.05) {
                pressure += 15;
                reason = 'Pressão média para ALTA';
            } else if (deviation.downDeviation > 0.02) {
                pressure += 5;
                reason = 'Leve pressão para ALTA';
            }

            if (deviation.specialDeviation < -0.02) {
                pressure += 8;
                reason = 'Branco abaixo do esperado - chance de aumento';
            }

            return { pressure, reason };
        }

        // 3. DETECÇÃO DE ANOMALIA
        function detectStatisticalAnomaly(deviation) {
            const upDevAbs = Math.abs(deviation.upDeviation);
            const downDevAbs = Math.abs(deviation.downDeviation);
            const specialDevAbs = Math.abs(deviation.specialDeviation);

            if (upDevAbs > 0.10 || downDevAbs > 0.10) {
                return { isAnomaly: true, severity: 'forte' };
            }

            if (deviation.specialPct < 0.03 || deviation.specialPct > 0.10) {
                return { isAnomaly: true, severity: 'média' };
            }

            if (upDevAbs > 0.05 || downDevAbs > 0.05) {
                return { isAnomaly: true, severity: 'leve' };
            }

            return { isAnomaly: false, severity: 'nenhuma' };
        }

        // 4. PROBABILIDADE ADAPTATIVA
        function calculateAdaptiveProbability(deviation) {
            const upDevAbs = Math.abs(deviation.upDeviation);
            const downDevAbs = Math.abs(deviation.downDeviation);
            const maxDeviation = Math.max(upDevAbs, downDevAbs);

            if (maxDeviation < 0.02) {
                return { boost: 0, description: 'Mercado equilibrado' };
            } else if (maxDeviation < 0.05) {
                return { boost: 5, description: 'Desequilíbrio leve' };
            } else if (maxDeviation < 0.10) {
                return { boost: 12, description: 'Desequilíbrio moderado' };
            } else {
                return { boost: 20, description: 'Desequilíbrio forte' };
            }
        }

        // ENGINE PRINCIPAL
        function analyzeStatisticalContext(entries) {
            if (entries.length === 0) {
                return {
                    deviation: {},
                    pressure: 0,
                    anomaly: false,
                    confidenceBoost: 0,
                    insights: ['Sem dados para análise estatística']
                };
            }

            const insights = [];
            let totalScore = 0;
            let totalBoost = 0;

            // Análise multi-janela
            const windows = [
                { size: 25, weight: 1.0, label: 'curto' },
                { size: 50, weight: 1.5, label: 'médio' },
                { size: 100, weight: 2.0, label: 'longo' }
            ];

            windows.forEach(window => {
                const deviation = calculateDeviation(entries, window.size);
                const rebalance = calculateRebalancePressure(deviation);
                const anomaly = detectStatisticalAnomaly(deviation);
                const probability = calculateAdaptiveProbability(deviation);

                const weightedPressure = rebalance.pressure * window.weight;
                const weightedBoost = probability.boost * window.weight;

                totalScore += weightedPressure;
                totalBoost += weightedBoost;

                if (rebalance.reason) {
                    insights.push(`[${window.label}] ${rebalance.reason}`);
                }

                if (anomaly.isAnomaly && window.label === 'longo') {
                    insights.push(`Anomalia ${anomaly.severity} detectada`);
                }
            });

            // Análise final
            const finalDeviation = calculateDeviation(entries, 100);
            const finalAnomaly = detectStatisticalAnomaly(finalDeviation);

            // Normalizar
            const avgPressure = totalScore / windows.length;
            const avgBoost = Math.min(20, totalBoost / windows.length);

            if (finalDeviation.upPct > 0.50) {
                insights.push('Vermelho acima do esperado');
            }
            if (finalDeviation.downPct > 0.50) {
                insights.push('Preto acima do esperado');
            }
            if (finalDeviation.specialPct < 0.04) {
                insights.push('Branco raro - possível aumento');
            }

            return {
                deviation: finalDeviation,
                pressure: Math.round(avgPressure),
                anomaly: finalAnomaly.isAnomaly,
                confidenceBoost: Math.round(avgBoost),
                insights: insights.slice(0, 5)
            };
        }

                // ============================================================================
        // 📝 MÓDULO DE PARSING DE LISTA DE TEXTO
        // ============================================================================

        function parseTextList(textInput) {
            const lines = textInput.trim().split('\n').map(l => l.trim()).filter(l => l);
            const entries = [];
            
            let i = 0;
            while (i < lines.length) {
                // Procurar por padrão de data/hora (DD/MM/YYYY HH:MM:SS)
                const dateTimeMatch = lines[i].match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2}):(\d{2})$/);
                
                if (!dateTimeMatch) {
                    i++;
                    continue;
                }

                const [, day, month, year, hours, minutes, seconds] = dateTimeMatch;
                const fullDateTime = `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
                
                // Próxima linha pode ser um número ou um horário
                let colorNumber = null;
                let timeHour = null;
                let timeMinute = null;
                let nextIndex = i + 1;

                // Verificar se a próxima linha é um número
                if (nextIndex < lines.length) {
                    const numberMatch = lines[nextIndex].match(/^(\d+)$/);
                    if (numberMatch) {
                        colorNumber = parseInt(numberMatch[1]);
                        nextIndex++;
                    }
                }

                // Procurar pelo horário (HH:MM)
                if (nextIndex < lines.length) {
                    const timeMatch = lines[nextIndex].match(/^(\d{2}):(\d{2})$/);
                    if (timeMatch) {
                        [, timeHour, timeMinute] = timeMatch;
                        timeHour = parseInt(timeHour);
                        timeMinute = parseInt(timeMinute);
                        nextIndex++;
                    }
                }

                // Se encontrou horário, adicionar entrada
                if (timeHour !== null && timeMinute !== null) {
                    // Determinar cor baseada no número (Refinado para Brancos/Especiais)
                    let color = 'special'; // Padrão: branco (especial)
                    
                    if (colorNumber !== null) {
                        // Se o número for de 1 a 7 -> Vermelho (Alta)
                        if (colorNumber >= 1 && colorNumber <= 7) {
                            color = 'up';
                        } 
                        // Se o número for de 8 a 14 -> Preto (Baixa)
                        else if (colorNumber >= 8 && colorNumber <= 14) {
                            color = 'down';
                        }
                        // Caso contrário (ex: 0, 15+ ou nulo) -> Branco (Especial)
                        else {
                            color = 'special';
                        }
                    } else {
                        // Se não houver número, mas houver horário, tratamos como especial/branco
                        color = 'special';
                    }

                    entries.push({
                        date: fullDateTime,
                        hour: timeHour,
                        minute: timeMinute,
                        color: color,
                        number: colorNumber
                    });

                    i = nextIndex;
                } else {
                    i++;
                }
            }

            return entries;
        }

        
        
        async function fetchData() {
            const targetUrl = 'https://www.tipminer.com/br/historico/blaze/double';
            const proxies = [
                url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&timestamp=${Date.now()}`,
                url => `https://corsproxy.io/?${encodeURIComponent(url)}`
            ];

            let success = false;
            let lastError = null;

            // Verificar se está rodando via file://
            if (window.location.protocol === 'file:') {
                console.warn('Atenção: Executar via file:// pode causar bloqueios de CORS. Recomenda-se usar o GitHub Pages ou um servidor local.');
            }

            for (const proxyFn of proxies) {
                try {
                    const finalUrl = proxyFn(targetUrl);
                    console.log('Tentando buscar dados via:', finalUrl);
                    
                    const response = await fetch(finalUrl);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    
                    const data = await response.json();
                    // AllOrigins retorna em .contents, outros podem retornar o HTML direto ou em outro campo
                    let html = '';
                    if (data.contents) {
                        html = data.contents;
                    } else if (typeof data === 'string') {
                        html = data;
                    } else {
                        // Tentar converter se for um objeto inesperado
                        html = JSON.stringify(data);
                    }
                    
                    // Se o proxy retornar o HTML direto (não JSON), precisamos tratar
                    if (!html || html.length < 100) {
                        // Tentar ler como texto se o JSON falhou ou veio vazio
                        try {
                            html = await response.text();
                        } catch(e) {}
                    }
    
                    if (!html || html.length < 100) throw new Error('Conteúdo retornado muito curto ou inválido');

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    const cells = doc.querySelectorAll('button.cell');
                    if (cells.length === 0) throw new Error('Nenhuma célula de resultado encontrada no HTML');

                    const newEntries = [];
                    let latestTimestamp = null;

                    const firstTooltip = doc.querySelector('.cell__tooltip');
                    if (firstTooltip) {
                        latestTimestamp = firstTooltip.textContent.trim();
                    }

                    if (latestTimestamp && latestTimestamp === lastProcessedTimestamp) {
                        console.log('Sem novos dados no TipMiner.');
                        success = true;
                        break;
                    }

                    cells.forEach(cell => {
                        const resDiv = cell.querySelector('.cell__result');
                        const num = resDiv ? resDiv.textContent.trim() : '';
                        const dateDiv = cell.querySelector('.cell__date');
                        const timeStr = dateDiv ? dateDiv.textContent.trim() : '';
                        
                        let internalColor = 'neutral';
                        if (cell.classList.contains('cell--type-default')) internalColor = 'down';
                        else if (cell.classList.contains('cell--type-double')) internalColor = 'up';
                        else if (cell.classList.contains('cell--type-lucky')) internalColor = 'special';
                        
                        if (num && timeStr) {
                            newEntries.push(`${timeStr}|${internalColor}`);
                        }
                    });

                    if (newEntries.length > 0) {
                        lastProcessedTimestamp = latestTimestamp;
                        newEntries.forEach(entry => {
                            const timeStr = entry.split('|')[0];
                            const existingIndex = allTimes.findIndex(t => t.startsWith(timeStr));
                            if (existingIndex === -1) {
                                allTimes.push(entry);
                            } else if (allTimes[existingIndex].endsWith('|neutral') && !entry.endsWith('|neutral')) {
                                allTimes[existingIndex] = entry;
                            }
                        });

                        allTimes.sort((a, b) => a.split('|')[0].localeCompare(b.split('|')[0]));
                        saveHistory();
                        updateUI();
                        showToast(`🔄 Sincronizado: ${newEntries.length} resultados.`, 'success');
                    }
                    
                    success = true;
                    break; // Sai do loop de proxies se tiver sucesso
                } catch (error) {
                    console.error('Falha no proxy:', error);
                    lastError = error;
                    continue; // Tenta o próximo proxy
                }
            }

            if (!success) {
                showToast('Erro de conexão. Verifique o console para detalhes.', 'error');
                if (window.location.protocol === 'file:') {
                    showToast('Dica: Tente hospedar no GitHub Pages para evitar erros de CORS local.', 'warning');
                }
            }
        }
    
        function toggleAutomation() {
            if (isAutomationRunning) {
                clearInterval(automationInterval);
                isAutomationRunning = false;
                showToast('Automação desativada.', 'warning');
            } else {
                fetchData(); // Busca imediata
                automationInterval = setInterval(fetchData, 15000);
                isAutomationRunning = true;
                showToast('Automação ativada (15s).', 'success');
            }
            updateUI();
        }
    
        function processTextListInput(textInput) {
            try {
                const entries = parseTextList(textInput);
                
                if (entries.length === 0) {
                    showToast('Nenhuma entrada válida encontrada. Verifique o formato.', 'warning');
                    return;
                }

                // Converter para formato de horário com cor (HH:MM|color)
                entries.forEach(e => {
                    const h = String(e.hour).padStart(2, '0');
                    const m = String(e.minute).padStart(2, '0');
                    const timeStr = `${h}:${m}`;
                    const timeWithColor = `${timeStr}|${e.color}`;
                    
                    // Verificar se já existe esse horário (independente da cor)
                    const existingIndex = allTimes.findIndex(t => t.startsWith(timeStr));
                    if (existingIndex !== -1) {
                        // Atualizar cor se for diferente de neutral
                        if (e.color !== 'neutral') {
                            allTimes[existingIndex] = timeWithColor;
                        }
                    } else {
                        allTimes.push(timeWithColor);
                    }
                });
                
                // Ordenar cronologicamente pelo horário
                allTimes.sort((a, b) => {
                    const tA = a.split('|')[0];
                    const tB = b.split('|')[0];
                    return tA.localeCompare(tB);
                });

                // Salvar no localStorage
                saveHistory();

                // Atualizar UI
                updateUI();

                showToast(`✅ ${entries.length} entrada(s) adicionada(s) com sucesso!`, 'success');
                
                // Limpar textarea
                const textarea = document.getElementById('text-input');
                if (textarea) textarea.value = '';

            } catch (error) {
                console.error('Erro ao processar lista:', error);
                showToast('Erro ao processar a lista. Verifique o formato.', 'error');
            }
        }

                // ============================================================================
        // 🤖 MÓDULO DE IA ADAPTATIVA - APRENDIZADO COM REFORÇO
        // ============================================================================

        // Estrutura global da IA Adaptativa
        const AdaptiveAI = {
            weights: {
                momentum: 20,
                reversal: 25,
                statistical: 15,
                pattern: 20,
                special: 10,
                acceleration: 12,
                breakout: 22,
                cycles: 14
            },
            history: [],
            accuracy: 50,
            pendingDecision: null,
            patternMemory: {},
            maxHistorySize: 200
        };

        // Carregar pesos salvos do localStorage
        function loadAdaptiveWeights() {
            const saved = localStorage.getItem('adaptiveAI_weights');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    AdaptiveAI.weights = data.weights || AdaptiveAI.weights;
                    AdaptiveAI.accuracy = data.accuracy || 50;
                    AdaptiveAI.history = data.history || [];
                    AdaptiveAI.patternMemory = data.patternMemory || {};
                    console.log('✅ Pesos adaptativos carregados:', AdaptiveAI.weights);
                } catch (e) {
                    console.warn('Erro ao carregar pesos adaptativos:', e);
                }
            }
        }

        // Salvar pesos no localStorage
        function saveAdaptiveWeights() {
            const data = {
                weights: AdaptiveAI.weights,
                accuracy: AdaptiveAI.accuracy,
                history: AdaptiveAI.history.slice(-AdaptiveAI.maxHistorySize),
                patternMemory: AdaptiveAI.patternMemory
            };
            localStorage.setItem('adaptiveAI_weights', JSON.stringify(data));
        }

        // 1. REGISTRO DE DECISÕES
        function recordDecision(decisionData) {
            const record = {
                timestamp: Date.now(),
                decision: decisionData.signal,
                score: decisionData.strength,
                confidence: decisionData.confidence,
                filters: {
                    momentum: decisionData.momentumValue || 0,
                    reversal: decisionData.reversalValue || 0,
                    statistical: decisionData.statisticalValue || 0,
                    pattern: decisionData.patternValue || 0
                },
                status: 'pending'
            };

            AdaptiveAI.history.push(record);
            AdaptiveAI.pendingDecision = record;

            // Manter limite de histórico
            if (AdaptiveAI.history.length > AdaptiveAI.maxHistorySize) {
                AdaptiveAI.history.shift();
            }

            saveAdaptiveWeights();
            return record;
        }

        // 2. REGISTRO DO RESULTADO REAL
        function recordOutcome(resultColor) {
            if (!AdaptiveAI.pendingDecision) {
                console.warn('Nenhuma decisão pendente para registrar resultado');
                return;
            }

            const decision = AdaptiveAI.pendingDecision;
            const correct = (decision.decision === 'ALTA' && resultColor === 'up') ||
                           (decision.decision === 'BAIXA' && resultColor === 'down');

            decision.status = 'completed';
            decision.result = resultColor;
            decision.correct = correct;

            // Atualizar acurácia
            const recentDecisions = AdaptiveAI.history.filter(d => d.status === 'completed').slice(-20);
            const correctCount = recentDecisions.filter(d => d.correct).length;
            AdaptiveAI.accuracy = Math.round((correctCount / Math.max(1, recentDecisions.length)) * 100);

            // Aplicar aprendizado
            adaptWeights(decision, correct);

            // Guardar padrão
            const patternKey = Object.values(decision.filters).join('-');
            if (!AdaptiveAI.patternMemory[patternKey]) {
                AdaptiveAI.patternMemory[patternKey] = { correct: 0, wrong: 0 };
            }
            if (correct) {
                AdaptiveAI.patternMemory[patternKey].correct++;
            } else {
                AdaptiveAI.patternMemory[patternKey].wrong++;
            }

            AdaptiveAI.pendingDecision = null;
            saveAdaptiveWeights();

            console.log(`📊 Resultado registrado: ${correct ? '✅ ACERTO' : '❌ ERRO'} | Acurácia: ${AdaptiveAI.accuracy}%`);
        }

        // 3. MOTOR DE APRENDIZADO (Reforço)
        function adaptWeights(decision, correct) {
            const adjustmentFactor = correct ? 1 : -2;

            // Ajustar pesos baseado no impacto de cada filtro
            Object.keys(decision.filters).forEach(filterName => {
                const filterValue = Math.abs(decision.filters[filterName]);
                const impact = filterValue / 100; // Normalizar impacto

                if (AdaptiveAI.weights[filterName]) {
                    const adjustment = adjustmentFactor * impact * 0.5;
                    AdaptiveAI.weights[filterName] += adjustment;

                    // Aplicar limites de segurança
                    AdaptiveAI.weights[filterName] = Math.max(5, Math.min(50, AdaptiveAI.weights[filterName]));
                }
            });

            // Detecção de instabilidade
            if (AdaptiveAI.accuracy < 40) {
                console.warn('⚠️ Acurácia baixa detectada. Reduzindo pesos em 15%...');
                Object.keys(AdaptiveAI.weights).forEach(key => {
                    AdaptiveAI.weights[key] *= 0.85;
                });
            }

            normalizeWeights();
        }

        // 4. NORMALIZAÇÃO DE PESOS
        function normalizeWeights() {
            const total = Object.values(AdaptiveAI.weights).reduce((a, b) => a + b, 0);
            const targetTotal = 150; // Soma alvo dos pesos

            Object.keys(AdaptiveAI.weights).forEach(key => {
                AdaptiveAI.weights[key] = (AdaptiveAI.weights[key] / total) * targetTotal;
            });
        }

        // 5. CALCULAR ACURÁCIA
        function getAccuracy() {
            const completed = AdaptiveAI.history.filter(d => d.status === 'completed');
            if (completed.length === 0) return 0;

            const correct = completed.filter(d => d.correct).length;
            return Math.round((correct / completed.length) * 100);
        }

        // 6. RENDERIZAR DASHBOARD DE APRENDIZADO
        function renderAdaptiveAIDashboard() {
            const accuracy = getAccuracy();
            const completedDecisions = AdaptiveAI.history.filter(d => d.status === 'completed');
            const totalDecisions = completedDecisions.length;
            
            // Tradução dos nomes dos pesos
            const weightTranslations = {
                momentum: 'Momento',
                reversal: 'Reversão',
                statistical: 'Estatística',
                pattern: 'Padrão',
                special: 'Especial',
                acceleration: 'Aceleração',
                breakout: 'Rompimento',
                cycles: 'Ciclos'
            };

            return `
                <div class="rounded-2xl border p-6 bg-card shadow-glow mt-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xl font-bold">🤖 IA Adaptativa</h3>
                        <span class="px-2 py-1 rounded-md bg-accent/10 text-accent text-[10px] font-bold uppercase tracking-wider">Motor Ativo</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="rounded-lg bg-secondary/50 p-3 border border-white/5">
                            <p class="text-[10px] text-muted-foreground uppercase font-bold">Acurácia Global</p>
                            <p class="text-2xl font-bold text-accent">${accuracy}%</p>
                        </div>
                        <div class="rounded-lg bg-secondary/50 p-3 border border-white/5">
                            <p class="text-[10px] text-muted-foreground uppercase font-bold">Ciclos de Treino</p>
                            <p class="text-2xl font-bold text-accent">${totalDecisions}</p>
                        </div>
                    </div>
                    <div class="rounded-lg bg-secondary/30 p-4 border border-white/5">
                        <p class="text-xs font-bold mb-3 text-muted-foreground uppercase tracking-tight">Pesos de Decisão (Ajuste Dinâmico):</p>
                        <div class="space-y-3">
                            ${Object.entries(AdaptiveAI.weights).map(([key, value]) => {
                                const label = weightTranslations[key] || key;
                                const percent = (value / 50) * 100; // 50 é o max weight definido no código
                                return `
                                    <div class="space-y-1">
                                        <div class="flex justify-between text-[10px] font-bold uppercase">
                                            <span>${label}</span>
                                            <span class="text-accent font-mono">${value.toFixed(1)}</span>
                                        </div>
                                        <div class="w-full bg-black/20 rounded-full h-1">
                                            <div class="bg-accent h-1 rounded-full" style="width: ${Math.min(100, percent)}%"></div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                    <p class="mt-4 text-[10px] text-muted-foreground italic text-center">A IA aprende com cada novo dado inserido, ajustando os pesos para melhorar as previsões futuras.</p>
                </div>
            `;
        }

                // ============================================================================
        // 💾 HISTÓRICO PERSISTENTE - LOCALSTORAGE
        // ============================================================================
        function saveHistory() {
            try {
                localStorage.setItem('wave_history', JSON.stringify(allTimes));
                localStorage.setItem('wave_history_timestamp', new Date().toISOString());
            } catch (e) {
                console.warn('Erro ao salvar histórico:', e);
            }
        }

        function loadHistory() {
            try {
                const saved = localStorage.getItem('wave_history');
                if (saved) {
                    allTimes = JSON.parse(saved);
                    return true;
                }
            } catch (e) {
                console.warn('Erro ao carregar histórico:', e);
            }
            return false;
        }

        function getHistoryStatus() {
            const saved = localStorage.getItem('wave_history');
            const timestamp = localStorage.getItem('wave_history_timestamp');
            
            if (saved) {
                const date = new Date(timestamp);
                const timeAgo = Math.floor((Date.now() - date.getTime()) / 1000);
                
                if (timeAgo < 60) return '✅ Histórico carregado (agora)';
                if (timeAgo < 3600) return `✅ Histórico carregado (há ${Math.floor(timeAgo / 60)}m)`;
                if (timeAgo < 86400) return `✅ Histórico carregado (há ${Math.floor(timeAgo / 3600)}h)`;
                return `✅ Histórico carregado (há ${Math.floor(timeAgo / 86400)}d)`;
            }
            return '📝 Novo início';
        }

        
        // Configurações de Automação
        let automationInterval = null;
        let isAutomationRunning = false;
        let lastProcessedTimestamp = null;

        function getAutomationStatus() {
            if (!isAutomationRunning) return '🔴 Automação Parada';
            return '🟢 Automação Ativa (15s)';
        }
    
        let allTimes = [];
        function updateUI() {
            loadAdaptiveWeights(); renderApp(allTimes, analyze(parseTimes(allTimes))); }
        function addTimes(incoming) { allTimes = [...incoming, ...allTimes]; saveHistory(); updateUI(); }
        function clearHistory() { allTimes = []; localStorage.removeItem('wave_history'); localStorage.removeItem('wave_history_timestamp'); updateUI(); }
        function setupEventListeners() {
            const uploadBtn = document.getElementById('upload-btn');
            const fileInput = document.getElementById('file-input');
            const dropZone = document.getElementById('drop-zone');
            if (uploadBtn) uploadBtn.addEventListener('click', () => fileInput.click());
            if (fileInput) fileInput.addEventListener('change', (e) => { const file = e.target.files?.[0]; if (file) handleFile(file); e.currentTarget.value = ''; });
            if (dropZone) { dropZone.addEventListener('dragover', (e) => e.preventDefault()); dropZone.addEventListener('drop', (e) => { e.preventDefault(); const file = e.dataTransfer.files?.[0]; if (file) handleFile(file); }); }
        }

        async function handleFile(file) {
            const uploadBtn = document.getElementById('upload-btn');
            if (uploadBtn) { uploadBtn.disabled = true; uploadBtn.innerHTML = 'Analisando...'; }
            console.log("Arquivo selecionado:", file.name, file.type, file.size);
            
            try {
                const reader = new FileReader();
                reader.onerror = () => {
                    console.error("Erro ao ler arquivo");
                    showToast("Erro ao ler arquivo.", "error");
                    if (uploadBtn) { uploadBtn.disabled = false; uploadBtn.innerHTML = 'Selecionar imagem'; }
                };
                reader.onload = async (e) => {
                    try {
                        const imageData = e.target.result;
                        const previewContainer = document.getElementById('preview-container');
                        if (previewContainer) previewContainer.innerHTML = `<img src="${imageData}" class="max-h-48 rounded-lg border">`;
                        
                                                console.log("Iniciando processamento da imagem...");
                        const timesWithColor = await processImageGrid(imageData);
                        
                        // Aplicar overlay visual de detecção OCR
                        const worker = await Tesseract.createWorker('por');
                        const { data: { words } } = await worker.recognize(imageData);
                        await worker.terminate();
                        applyOCROverlay(imageData, words);
                        
                        if (timesWithColor && timesWithColor.length) { 
                            showToast(`${timesWithColor.length} eventos extraídos.`); 
                            addTimes(timesWithColor); 
                        } else {
                            showToast('Nenhum dado encontrado na imagem.', 'warning');
                        }
                    } catch (innerError) {
                        console.error("Erro interno no processamento:", innerError);
                        showToast("Erro ao processar dados da imagem.", "error");
                    } finally {
                        if (uploadBtn) { uploadBtn.disabled = false; uploadBtn.innerHTML = 'Selecionar imagem'; }
                    }
                };
                reader.readAsDataURL(file);
            } catch (error) { 
                console.error("Erro fatal no handleFile:", error);
                showToast('Erro crítico ao processar.', 'error'); 
                if (uploadBtn) { uploadBtn.disabled = false; uploadBtn.innerHTML = 'Selecionar imagem'; } 
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const toastContainer = document.createElement('div'); toastContainer.id = 'toast-container'; toastContainer.className = 'toast-container'; document.body.appendChild(toastContainer);
            loadHistory();
            updateUI();
        });
    </script>
